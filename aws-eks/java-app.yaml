apiVersion: apps/v1
kind: Deployment
metadata:
  name: java-app
  namespace: demo-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: java-app
  template:
    metadata:
      labels:
        app: java-app
    spec:
      containers:
      - name: java-app
        image: springcloud/spring-cloud-dataflow-server:2.11.3 # 僅作為 Java 範例鏡像
        env:
        - name: SPRING_DATASOURCE_URL
          value: "jdbc:postgresql://postgres-service:5432/mydatabase"
        - name: SPRING_DATASOURCE_USERNAME
          value: "user"
        - name: SPRING_DATASOURCE_PASSWORD
          value: "password"
        - name: SPRING_REDIS_HOST
          value: "redis-service"
        ports:
        - containerPort: 8080
---
# 建立一個 LoadBalancer，讓對外網路可以連到你的 Java App
apiVersion: v1
kind: Service
metadata:
  name: java-app-service
  namespace: demo-app
spec:
  type: LoadBalancer
  selector:
    app: java-app
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080